
<!DOCTYPE html>
<html lang="en">
<head>

<title>Fantasy Eggy</title>
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">

<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..900,0..100,0..1&family=Outfit:wght@300..800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --indigo:#171233; --pit:#100C26; --panel:#1F1941; --panel2:#28214F;
  --yolk:#FFC53D; --yolk-deep:#E8A916; --coral:#FF6B5E; --mint:#7FE8C3;
  --cream:#FFF3DC; --cream-dim:#CFC5AC; --ink:#2B2140; --ink-soft:#5A4E78;
  --line:#2E2660; --line2:#3A3170; --dash:#322A63;
  --chrome:rgba(16,12,38,.88);
  --glow1:#2A2058; --glow2:rgba(255,107,94,.10);
  color-scheme:dark;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
html[data-theme="light"]{
  --indigo:#F4ECD9; --pit:#EDE3CC; --panel:#FDF8EC; --panel2:#F1E7CF;
  --yolk:#C98A12; --yolk-deep:#A96F05; --coral:#D9503F; --mint:#2E8F63;
  --cream:#332A20; --cream-dim:#8A7C63; --ink:#F6EFDF; --ink-soft:#C9B99B;
  --line:#DDD0B2; --line2:#CBBC98; --dash:#D8CAA8;
  --chrome:rgba(244,236,217,.9);
  --glow1:#FFF7E2; --glow2:rgba(201,138,18,.08);
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--pit)}
body{
  font-family:'Outfit',system-ui,sans-serif;color:var(--cream);
  background:
    radial-gradient(1200px 500px at 50% -10%, var(--glow1) 0%, transparent 60%),
    radial-gradient(700px 380px at 85% 8%, var(--glow2), transparent 65%),
    var(--indigo);
  min-height:100vh;font-size:16px;line-height:1.45;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;font-variation-settings:'SOFT' 80,'WONK' 1,'opsz' 60}
a{color:var(--yolk)}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:16px}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 96px}

/* ---------- top bar ---------- */
header{position:sticky;top:0;z-index:50;background:var(--chrome);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:12px 16px}
.logo{display:flex;align-items:center;gap:8px;font-family:'Fraunces',serif;font-weight:800;font-size:1.35rem;letter-spacing:.5px;color:var(--yolk);font-variation-settings:'SOFT' 100,'WONK' 1}
.logo span{color:var(--cream);font-weight:500;font-style:italic}
.who{margin-left:auto;font-size:.85rem;color:var(--cream-dim)}
.who b{color:var(--cream)}
.linkbtn{background:none;border:none;color:var(--coral);font-size:.8rem;text-decoration:underline;padding:2px 4px}

/* ---------- tabs ---------- */
nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:var(--chrome);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;background:none;border:none;color:var(--cream-dim);padding:13px 4px 11px;font-size:.85rem;font-weight:600;letter-spacing:.4px;border-top:2px solid transparent}
nav.tabs button.on{color:var(--yolk);border-top-color:var(--yolk)}

/* ---------- cards / panels ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin:14px 0}
.panel h2{font-size:1.25rem;margin-bottom:8px}
.muted{color:var(--cream-dim);font-size:.88rem}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pill{display:inline-block;font-family:var(--mono);font-size:.75rem;padding:3px 10px;border-radius:999px;border:1px solid var(--line2);color:var(--cream-dim)}
.pill.live{border-color:var(--coral);color:var(--coral);animation:pulse 1.6s infinite}
.pill.open{border-color:var(--mint);color:var(--mint)}
.pill.locked{border-color:var(--yolk);color:var(--yolk)}
.pill.final{border-color:#6C61A8;color:#9A8FD6}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.showrow{display:flex;gap:12px;align-items:center;padding:13px 4px;border-bottom:1px dashed var(--dash)}
.showrow:last-child{border-bottom:none}
.showrow .date{font-family:var(--mono);color:var(--yolk);font-size:.85rem;min-width:74px}
.showrow .v{flex:1;min-width:0}
.showrow .v .venue{font-weight:600}
.showrow .v .loc{font-size:.82rem;color:var(--cream-dim)}
.showrow button{background:var(--panel2);color:var(--cream);border:1px solid var(--line2);border-radius:10px;padding:8px 12px;font-size:.82rem;font-weight:600}

/* ---------- the setlist card (signature) ---------- */
.sheet{position:relative;background:var(--cream);color:var(--ink);border-radius:6px;padding:26px 22px 22px;margin:22px 6px;box-shadow:0 14px 40px rgba(0,0,0,.5), 0 2px 0 rgba(0,0,0,.2);transform:rotate(-.5deg)}
.sheet::before,.sheet::after{content:'';position:absolute;width:86px;height:26px;background:rgba(120,120,128,.55);top:-12px;transform:rotate(-4deg);left:14%;box-shadow:inset 0 0 6px rgba(0,0,0,.25)}
.sheet::after{left:auto;right:12%;transform:rotate(5deg)}
.sheet h2{font-size:1.5rem;font-variation-settings:'SOFT' 100,'WONK' 1;margin-bottom:2px}
.sheet .sub{font-family:var(--mono);font-size:.78rem;color:var(--ink-soft);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.slotline{display:flex;align-items:baseline;gap:10px;margin:14px 0}
.slotline label{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;min-width:86px}
.slotline .pts{font-family:var(--mono);font-size:.7rem;color:var(--ink-soft);border:1px solid var(--ink-soft);border-radius:999px;padding:1px 7px;white-space:nowrap}
.slotline input{flex:1;min-width:0;background:transparent;border:none;border-bottom:2px dashed var(--ink-soft);color:var(--ink);padding:4px 2px;font-size:1rem;font-family:'Outfit'}
.slotline input:focus{outline:none;border-bottom-color:var(--yolk-deep);border-bottom-style:solid}
.sheet .divider{border-top:1px solid rgba(43,33,64,.2);margin:18px 0 6px;padding-top:10px;font-family:var(--mono);font-size:.72rem;color:var(--ink-soft);letter-spacing:1px;text-transform:uppercase}
.savebtn{width:100%;margin-top:18px;background:var(--ink);color:var(--cream);border:none;border-radius:10px;padding:14px;font-size:1.05rem;font-weight:700;font-family:'Fraunces',serif;letter-spacing:.5px}
.savebtn:disabled{opacity:.45}
.countbig{font-family:var(--mono);text-align:center;margin:6px 0 0;font-size:.85rem;color:var(--ink-soft)}
.countbig b{color:var(--coral)}

/* ---------- leaderboard ---------- */
.lb{width:100%;border-collapse:collapse}
.lb td,.lb th{padding:10px 8px;text-align:left;border-bottom:1px dashed var(--dash)}
.lb th{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--cream-dim);font-weight:600}
.lb .rank{font-family:var(--mono);color:var(--yolk);width:36px}
.lb .pts{font-family:var(--mono);text-align:right;font-size:1.05rem}
.lb tr.me td{background:rgba(255,197,61,.07)}

/* ---------- setlist + results ---------- */
.songrow{display:flex;gap:10px;padding:7px 2px;border-bottom:1px dashed var(--dash);align-items:baseline}
.setbreak{font-family:var(--mono);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--yolk);border-bottom:1px solid var(--line);padding:12px 2px 4px;margin-top:4px}
.songrow .pos{font-family:var(--mono);font-size:.72rem;color:var(--cream-dim);min-width:44px}
.songrow.hitmine{background:linear-gradient(90deg,rgba(255,197,61,.14),transparent);border-radius:6px}
.songrow.hitmine .name{color:var(--yolk);font-weight:700}
.pickres{display:flex;gap:8px;align-items:baseline;padding:5px 0;font-size:.9rem}
.pickres .sl{font-family:var(--mono);font-size:.7rem;color:var(--cream-dim);min-width:64px;text-transform:uppercase}
.pickres .pt{margin-left:auto;font-family:var(--mono)}
.pickres.hit .pt{color:var(--mint)}
.pickres.miss{opacity:.55}

/* ---------- forms / auth / admin ---------- */
.field{margin:12px 0}
.field label{display:block;font-size:.8rem;color:var(--cream-dim);margin-bottom:5px;letter-spacing:.4px}
.field input,.field select{width:100%;background:var(--pit);border:1px solid var(--line2);border-radius:10px;color:var(--cream);padding:11px 12px}
.btn{background:var(--yolk);color:#221A0A;border:none;border-radius:10px;padding:12px 18px;font-weight:700;font-size:.95rem}
.btn.ghost{background:var(--panel2);color:var(--cream);border:1px solid var(--line2)}
.btn.small{padding:7px 12px;font-size:.8rem}
.btn:disabled{opacity:.5}
.err{color:var(--coral);font-size:.85rem;margin-top:8px;min-height:1.2em}
.admin-slot{display:flex;gap:8px;margin:6px 0;flex-wrap:wrap}
.admin-slot input,.admin-slot select{background:var(--pit);border:1px solid var(--line2);border-radius:8px;color:var(--cream);padding:8px 10px;font-size:.85rem}
.admin-slot select.k,.admin-slot input.k{flex:1 1 130px;min-width:0}.admin-slot input.p{width:64px;font-family:var(--mono)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ---------- toasts ---------- */
#toasts{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:99;width:min(92vw,420px);display:flex;flex-direction:column;gap:8px}
.toast{background:var(--cream);color:var(--ink);border-radius:12px;padding:12px 14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);border-left:6px solid var(--yolk);animation:drop .35s cubic-bezier(.2,1.4,.4,1)}
.toast.score{border-left-color:var(--mint)}
@keyframes drop{from{transform:translateY(-16px);opacity:0}to{transform:none;opacity:1}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
.autocomplete{position:relative}
.acc-list{position:absolute;top:100%;left:0;right:0;background:var(--cream);border-radius:0 0 10px 10px;box-shadow:0 12px 28px rgba(0,0,0,.35);z-index:30;max-height:210px;overflow:auto}
.acc-list div{padding:9px 12px;color:var(--ink);font-size:.92rem;border-bottom:1px solid rgba(43,33,64,.08);cursor:pointer}
.acc-list div small{color:var(--ink-soft);font-family:var(--mono);float:right}
.acc-list div:hover,.acc-list div.sel{background:var(--yolk);color:#221A0A}
.hidden{display:none!important}
</style>
</head>

<script>
/* =================== CONFIG — EDIT THESE =================== */
const SUPABASE_URL  = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON = "YOUR-ANON-PUBLIC-KEY";
/* =========================================================== */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const FN_URL = SUPABASE_URL + "/functions/v1/carton-sync";
const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// theme: 'auto' follows the phone live; 'light'/'dark' are manual overrides
const sysLight = matchMedia("(prefers-color-scheme: light)");
let themeMode = localStorage.getItem("ft_theme2") || "auto"; // key bump: old ft_theme values were auto-written and block auto mode
function applyTheme(){
  const eff = themeMode === "auto" ? (sysLight.matches ? "light" : "dark") : themeMode;
  document.documentElement.dataset.theme = eff;
  const b = $("#themeBtn");
  if (b) b.textContent = themeMode === "auto" ? "\u{1F317}" : (themeMode === "light" ? "\u2600\uFE0F" : "\u{1F319}");
  if (b) b.title = "theme: " + themeMode + (themeMode === "auto" ? " (follows your phone)" : "");
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.content = eff === "light" ? "#F4ECD9" : "#171233";
}
function toggleTheme(){
  themeMode = { auto: "light", light: "dark", dark: "auto" }[themeMode] || "auto";
  localStorage.setItem("ft_theme2", themeMode);
  applyTheme();
}
const onSysTheme = () => { if (themeMode === "auto") applyTheme(); };
if (sysLight.addEventListener) sysLight.addEventListener("change", onSysTheme); else sysLight.addListener(onSysTheme);
applyTheme();

/* ---------------- utilities ---------------- */
const seenToasts = new Set();
function toast(msg, cls="", key=null){
  if (key){ if (seenToasts.has(key)) return; seenToasts.add(key); }
  const box = $("#toasts");
  while (box.children.length >= 4) box.firstChild.remove();
  const t = document.createElement("div");
  t.className = "toast " + cls; t.textContent = msg;
  t.onclick = () => t.remove();
  box.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}
function fmtDate(d){ return new Date(d + "T12:00:00").toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function fmtCutoff(ts){ if(!ts) return "TBD"; return new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'}); }
function countdown(ts){
  const ms = new Date(ts) - Date.now();
  if (ms <= 0) return null;
  const h = Math.floor(ms/36e5), m = Math.floor(ms%36e5/6e4), s = Math.floor(ms%6e4/1e3);
  return h > 0 ? `${h}h ${m}m` : `${m}m ${String(s).padStart(2,"0")}s`;
}
function clearTimers(){ timers.forEach(clearInterval); timers = []; }
async function rpc(fn, args){
  const { data, error } = await db.rpc(fn, args);
  if (error) throw new Error(error.message.replace(/^.*?: /,""));
  return data;
}
async function edgeFn(action){
  const r = await fetch(FN_URL, { method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+SUPABASE_ANON, "apikey":SUPABASE_ANON },
    body: JSON.stringify({ action }) });
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || "edge function failed");
  return j;
}
function showState(s){
  if (s.status === "final") return "final";
  const ov = (cfg && cfg.voting_override) || "auto";
  if (ov === "locked") return "locked";
  if (ov === "open" && s.showdate >= new Date().toLocaleDateString('sv')) return "open";
  if (!s.cutoff_at) return "no cutoff";
  if (new Date(s.cutoff_at) > new Date()) return "open";
  const twoDaysAgo = new Date(Date.now() - 2*864e5).toLocaleDateString('sv');
  if (s.showdate < twoDaysAgo) return "played";
  return s.status === "live" ? "live" : "locked";
}

async function authFlow(fn){

/* ---------------- shows list ---------------- */
async function renderShows(){
  clearTimers(); tab = "shows"; currentShow = null; markTab();
  const todayStr = new Date().toLocaleDateString('sv');
  const graceStr = new Date(Date.now() - 2*864e5).toISOString().slice(0,10);
  const [{ data: up }, { data: past }] = await Promise.all([
    db.from("shows").select("*").gte("showdate", graceStr).order("showdate"),
    db.from("shows").select("*").lt("showdate", graceStr).order("showdate",{ascending:false}).limit(12),
  ]);
  const isRecent = s => s.showdate < todayStr || s.status === "final";
  const upcoming = (up||[]).filter(s => !isRecent(s));
  const justPlayed = (up||[]).filter(isRecent);
  const finals = [...(up||[]), ...(past||[])].filter(s => s.status === "final").map(s => s.id);
  const winners = {};
  if (finals.length){
    const [{ data: sc }, { data: pl }] = await Promise.all([
      db.from("scores").select("show_id,player_id,points").in("show_id", finals),
      db.from("players_public").select("id,name"),
    ]);
    const pn = Object.fromEntries((pl||[]).map(p => [p.id, p.name]));
    for (const s of sc||[]){
      if (!winners[s.show_id] || s.points > winners[s.show_id].points)
        winners[s.show_id] = { points: s.points, name: pn[s.player_id] || "?" };
    }
  }
  const row = s => {
    const st = showState(s);
    const cls = { open:"open", live:"live", locked:"locked", final:"final", played:"final" }[st] || "";
    const cd = st === "open" ? countdown(s.cutoff_at) : null;
    const txt = st === "final" ? "complete" : (st === "open" && cd ? "locks in " + cd : st);
    const win = st === "final" && winners[s.id]
      ? ` <span style="color:var(--yolk);font-size:.82rem">👑 ${esc(winners[s.id].name)} · ${winners[s.id].points}</span>` : "";
    return `<div class="showrow">
      <div class="date">${fmtDate(s.showdate)}</div>
      <div class="v"><div class="venue">${esc(s.venue||"TBA")}</div>
        <div class="loc">${esc(s.city||"")}${s.state?", "+esc(s.state):""}
          <span class="pill ${cls}" data-cd="${st==='open'?s.cutoff_at:''}">${txt}</span>${win}</div></div>
      <button onclick="openShow(${s.id})">${st==='open'?'Pick':'View'}</button>
    </div>`;
  };
  $("#main").innerHTML = `
    ${justPlayed.length ? `<div class="panel"><h2>Just played</h2>${justPlayed.map(row).join("")}</div>` : ""}
    <div class="panel"><h2>Upcoming</h2>${upcoming.map(row).join("") || '<p class="muted">No shows synced yet — admin can sync from The Carton.</p>'}</div>
    <div class="panel"><h2>Recent</h2>${(past||[]).map(row).join("") || '<p class="muted">Nothing yet.</p>'}</div>`;
  timers.push(setInterval(() => {
    document.querySelectorAll("[data-cd]").forEach(el => {
      if (!el.dataset.cd) return;
      const cd = countdown(el.dataset.cd);
      el.textContent = cd ? "locks in " + cd : "locked";
    });
  }, 1000));
}

/* ---------------- pick sheet / show detail ---------------- */
async function openShow(id){
  clearTimers();
  const { data: show } = await db.from("shows").select("*").eq("id", id).single();
  currentShow = show;
  const st = showState(show);
  if (st === "open") renderPickSheet(show);
  else renderShowDetail(show);
}

function slotDefs(format){
  const sect = (format === "one_set" && cfg.oneset) ? cfg.oneset : cfg;
  const slots = (sect.slots||[]).map(s => ({ key:s.key, label:s.label, pts:s.points }));
  for (let i=1; i<=(sect.flat_picks||0); i++) slots.push({ key:"flat"+i, label:"Pick "+i, pts:sect.flat_points ?? cfg.flat_points ?? 1, flat:true });
  return slots;
}

async function renderPickSheet(show){
  let mine = [];
  try{ mine = await rpc("get_my_picks", { p_name:session.name, p_pin:session.pin, p_show_id:show.id }); }catch(e){}
  const val = k => esc((mine.find(p => p.slot===k)||{}).songname || "");
  const slots = slotDefs(show.format);
  const slotHtml = s => `
    <div class="slotline autocomplete">
      <label>${esc(s.label)}</label>
      <input data-slot="${s.key}" value="${val(s.key)}" placeholder="song…" autocomplete="off" spellcheck="false">
      <span class="pts">${s.pts} pt${s.pts===1?"":"s"}</span>
    </div>`;
  const structured = slots.filter(s=>!s.flat), flats = slots.filter(s=>s.flat);
  $("#main").innerHTML = `
    <p style="margin-top:14px"><button class="btn ghost small" onclick="renderShows()">← shows</button></p>
    <div class="sheet">
      <h2>${esc(show.venue||"TBA")}</h2>
      <div class="sub">${fmtDate(show.showdate)} · ${esc(show.city||"")}${show.state?", "+esc(show.state):""}${show.format==='one_set' ? " · FESTIVAL SET" : ""}</div>
      ${structured.map(slotHtml).join("")}
      ${flats.length ? `<div class="divider">Anywhere in the show</div>${flats.map(slotHtml).join("")}` : ""}
      <button class="savebtn" id="save">Lock 'em in</button>
      <div class="countbig">${cfg.voting_override==='open' ? 'Admin override — voting open' : `Locks ${fmtCutoff(show.cutoff_at)} · <b id="cd"></b>`}</div>
      <div class="err" id="p-err" style="text-align:center"></div>
    </div>`;
  document.querySelectorAll(".slotline input").forEach(attachAutocomplete);
  $("#save").onclick = savePicks;
  if (cfg.voting_override !== 'open' && show.cutoff_at) timers.push(setInterval(() => {
    const cd = countdown(show.cutoff_at);
    if (cd) $("#cd").textContent = cd + " left";
    else { toast("Picks are locked — enjoy the show 🥚"); openShow(show.id); }
  }, 1000));
}

function attachAutocomplete(input){
  let list = null, sel = -1;
  const close = () => { list?.remove(); list = null; sel = -1; };
  input.addEventListener("input", () => {
    close();
    const q = input.value.trim().toLowerCase();
    if (q.length < 1) return;
    const hits = songList.filter(s => s.songname.toLowerCase().includes(q)).slice(0, 8);
    if (!hits.length) return;
    list = document.createElement("div"); list.className = "acc-list";
    hits.forEach(h => {
      const d = document.createElement("div");
      d.innerHTML = `${esc(h.songname)} <small>${h.times_played ?? "–"}×</small>`;
      d.onmousedown = e => { e.preventDefault(); input.value = h.songname; close(); };
      list.appendChild(d);
    });
    input.parentElement.appendChild(list);
  });
  input.addEventListener("keydown", e => {
    if (!list) return;
    const items = [...list.children];
    if (e.key === "ArrowDown"){ sel = Math.min(sel+1, items.length-1); }
    else if (e.key === "ArrowUp"){ sel = Math.max(sel-1, 0); }
    else if (e.key === "Enter"){ e.preventDefault(); if (sel>=0){ input.value = items[sel].textContent.replace(/\s*\S*×$/,"").trim(); } close(); return; }
    else return;
    items.forEach((it,i) => it.classList.toggle("sel", i===sel));
  });
  input.addEventListener("blur", () => setTimeout(close, 150));
}

async function savePicks(){
  $("#p-err").textContent = "";
  const picks = [...document.querySelectorAll(".slotline input")]
    .map(i => ({ slot: i.dataset.slot, songname: i.value.trim() }))
    .filter(p => p.songname);
  // warn on unknown songs (typos) but allow — could be a debut call
  const unknown = picks.filter(p => !songList.some(s => s.songname.toLowerCase() === p.songname.toLowerCase()));
  if (unknown.length && !confirm(`Not in the catalog (typo, or a bold debut call?):\n${unknown.map(u=>u.songname).join("\n")}\n\nSave anyway?`)) return;
  try{
    await rpc("submit_picks", { p_name:session.name, p_pin:session.pin, p_show_id:currentShow.id, p_picks:picks });
    toast("Picks saved ✔", "score");
  }catch(e){ $("#p-err").textContent = e.message; }
}

async function renderShowDetail(show){
  clearTimers();
  const [{ data: setlist }, picks, { data: scores }, { data: plist }] = await Promise.all([
    db.from("setlist_songs").select("*").eq("show_id", show.id).order("position"),
    rpc("get_show_picks", { p_show_id: show.id }).catch(() => []),
    db.from("scores").select("*").eq("show_id", show.id).order("points",{ascending:false}),
    db.from("players_public").select("id,name"),
  ]);
  const pname = Object.fromEntries((plist||[]).map(p => [p.id, p.name]));
  const mineHits = new Set((picks||[]).filter(p => p.player_id === session.id).map(p => p.songname.toLowerCase()));
  let lastSet = null;
  const setHtml = (setlist||[]).map(s => {
    const label = s.is_encore ? "Encore" : "Set " + (s.setnumber || "1");
    const brk = label !== lastSet ? `<div class="setbreak">${esc(label)}</div>` : "";
    lastSet = label;
    return brk + `
    <div class="songrow ${mineHits.has(s.songname.toLowerCase()) ? "hitmine" : ""}">
      <span class="pos">${s.position}</span>
      <span class="name">${esc(s.songname)}</span>
    </div>`;
  }).join("");
  const scoreHtml = (scores||[]).map(sc => `
    <div class="panel" style="padding:12px">
      <div class="row"><b>${esc(pname[sc.player_id] || "?")}</b>
        <span class="pts" style="margin-left:auto;font-family:var(--mono);color:var(--yolk)">${sc.points} pts</span></div>
      ${(sc.breakdown||[]).map(b => `
        <div class="pickres ${b.points>0?"hit":b.hit?"":"miss"}">
          <span class="sl">${esc(b.slot)}</span><span>${esc(b.songname)}</span>
          <span class="pt">${b.points>0?"+"+b.points:"·"} <small class="muted">${esc(b.reason)}</small></span>
        </div>`).join("")}
    </div>`).join("");
  // pre-scoring pick board: cutoff has passed, picks are public, but no scores yet
  let pickBoard = "";
  if (!(scores||[]).length && (picks||[]).length){
    const slotOrder = slotDefs(show.format).map(sl => sl.key);
    const slotLabel = Object.fromEntries(slotDefs(show.format).map(sl => [sl.key, sl.label]));
    const byName = {};
    for (const p of picks) (byName[p.player_name] ??= []).push(p);
    pickBoard = `<h2 style="margin:18px 4px 4px">The picks are in</h2>` +
      Object.entries(byName).sort((a,b) => a[0].localeCompare(b[0])).map(([name, pp]) => `
        <div class="panel" style="padding:12px"><div class="row"><b>${esc(name)}</b></div>
          ${pp.sort((a,b) => slotOrder.indexOf(a.slot) - slotOrder.indexOf(b.slot)).map(p => `
            <div class="pickres"><span class="sl">${esc(slotLabel[p.slot] || p.slot)}</span>
              <span>${esc(p.songname)}</span></div>`).join("")}
        </div>`).join("");
  }
  $("#main").innerHTML = `
    <p style="margin-top:14px"><button class="btn ghost small" onclick="renderShows()">← shows</button>
      <span class="pill ${showState(show)==='live'?'live':'final'}">${showState(show)==='final'?'complete':showState(show)}</span></p>
    ${show.status==='final' && (scores||[]).length ? `<div class="panel" style="border-color:var(--yolk)">
      <h2>👑 ${esc(pname[scores[0].player_id]||"?")} takes it</h2>
      <p class="muted">${scores[0].points} points</p></div>` : ""}
    <div class="panel"><h2>${esc(show.venue||"")} <span class="muted" style="font-size:.85rem">${fmtDate(show.showdate)}</span></h2>
      ${setHtml || '<p class="muted">No setlist yet. It shows up here song-by-song once the tapers get typing.</p>'}</div>
    ${pickBoard}
    <h2 style="margin:18px 4px 4px">Scores</h2>
    ${scoreHtml || '<p class="muted" style="margin:8px 4px">No scores yet — they appear with the first song.</p>'}`;
}

/* ---------------- leaderboard ---------------- */
async function renderBoard(){
  clearTimers(); tab = "board"; markTab();
  const [{ data }, { data: plist }] = await Promise.all([
    db.from("scores").select("points, player_id"),
    db.from("players_public").select("id,name"),
  ]);
  const pname = Object.fromEntries((plist||[]).map(p => [p.id, p.name]));
  const totals = {};
  (data||[]).forEach(s => {
    const k = s.player_id;
    totals[k] ??= { name: pname[k] || "?", pts: 0, shows: 0 };
    totals[k].pts += s.points; totals[k].shows++;
  });
  const rows = Object.entries(totals).sort((a,b) => b[1].pts - a[1].pts);
  $("#main").innerHTML = `
    <div class="panel"><h2>Tour standings</h2>
    <table class="lb"><tr><th></th><th>Player</th><th>Shows</th><th style="text-align:right">Pts</th></tr>
    ${rows.map(([id,r],i) => `<tr class="${id===session.id?"me":""}">
      <td class="rank">${i+1}</td><td>${esc(r.name)}</td><td class="muted">${r.shows}</td><td class="pts">${r.pts}</td></tr>`).join("")
      || '<tr><td colspan="4" class="muted">No scores yet — pick some songs.</td></tr>'}
    </table></div>`;
}

        <button class="btn ghost small" onclick="runEdge('sync_shows', this)">Sync shows</button>
        <button class="btn ghost small" onclick="runEdge('sync_songs', this)">Sync song catalog</button>
        <button class="btn ghost small" onclick="runEdge('score', this)">Run scoring now</button>
      </div>
      <p class="muted" style="margin-top:8px">Scoring also runs automatically on the cron schedule. These are manual overrides.</p>
    </div>`;
  if ((shows||[]).length) loadRoster();
}
async function toggleFormat(showId, next){
  try{
    await rpc("admin_set_show_format", { p_name:session.name, p_pin:session.pin, p_show_id:showId, p_format:next });
    toast("Format: " + (next === "one_set" ? "1 set" : "2 set"), "score");
    renderAdmin();
  }catch(e){ toast(e.message); }
}
async function loadRoster(){
  const showId = Number($("#roster-show").value);
  if (!showId) return;
  try{
    const rows = await rpc("admin_pick_status", { p_name:session.name, p_pin:session.pin, p_show_id:showId });
    const total = rows.length, done = rows.filter(r => r.picks_count > 0).length;
    $("#roster").innerHTML = `
      <p class="muted" style="margin-bottom:6px"><b style="color:var(--mint)">${done}</b> of ${total} players have picks in</p>
      ${rows.map(r => `<div class="pickres ${r.picks_count>0?"hit":"miss"}">
        <span>${r.picks_count>0?"✔":"—"}</span><span>${esc(r.player_name)}</span>
        <span class="pt">${r.picks_count>0
          ? r.picks_count+" picks · saved "+new Date(r.last_saved).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
          : "no picks yet"}</span>
      </div>`).join("")}`;
  }catch(e){ $("#roster").innerHTML = `<p class="err">${esc(e.message)}</p>`; }
}
const SLOT_TYPES = {
  opener: "Opener — first song of the show",
  set1_closer: "Set 1 closer",
  set2_opener: "Set 2 opener",
  closer: "Closer — last pre-encore song",
  encore: "Encore — any encore song",
  show_closer: "Show closer — final song of the night",
  second_song: "2nd song of the show",
  cover_call: "Cover call — any cover played",
  debut_call: "Debut call — any debut played",
};
function adminSlotRow(sl){
  const opts = Object.entries(SLOT_TYPES).map(([k,d]) =>
    `<option value="${k}" ${k===sl.key?"selected":""}>${d}</option>`).join("");
  return `<div class="admin-slot">
    <select class="k" title="which position this slot scores against">${opts}</select>
    <input class="k" placeholder="Label players see" value="${esc(sl.label)}">
    <input class="p" type="number" min="0" value="${sl.points}">
    <button class="btn ghost small" onclick="this.parentElement.remove()">✕</button></div>`;
}
function addSlot(target){ $("#"+target).insertAdjacentHTML("beforeend", adminSlotRow({key:"encore",label:"",points:2})); }
function readSlots(containerId){
  return [...document.querySelectorAll('#'+containerId+' .admin-slot')].map(r => {
    const k = r.querySelector("select.k").value;
    const [l, p] = r.querySelectorAll("input");
    return { key: k, label: l.value.trim(), points: Number(p.value) };
  }).filter(sl => sl.key && sl.label);
}
async function saveConfig(){
  $("#cfg-err").textContent = "";
  const slots = readSlots('slots'), slots1 = readSlots('slots1');
  for (const arr of [slots, slots1]){
    const keys = arr.map(sl => sl.key);
    if (new Set(keys).size !== keys.length){
      $("#cfg-err").textContent = "Each slot type can only be used once per section."; return;
    }
  }
  const data = {
    slots,
    flat_picks: Number($("#c-flat").value), flat_points: Number($("#c-flatpts").value),
    partial_credit: $("#c-partial").value === "true", partial_points: Number($("#c-partpts").value),
    allow_duplicates: $("#c-dupes").value === "true",
    voting_override: $("#c-override").value,
    bonuses: { cover: Number($("#c-bcover").value), debut: Number($("#c-bdebut").value), perfect: Number($("#c-bperfect").value), jamchart: 0 },
    oneset: { slots: slots1, flat_picks: Number($("#c1-flat").value), flat_points: Number($("#c1-flatpts").value) },
  };
  try{
    await rpc("admin_update_config", { p_name:session.name, p_pin:session.pin, p_data:data });
    cfg = data; toast("Rules saved ✔", "score");
  }catch(e){ $("#cfg-err").textContent = e.message; }
}
async function saveCutoff(showId, btn){
  const input = document.querySelector(`input[data-show="${showId}"]`);
  if (!input.value) return;
  try{
    await rpc("admin_set_cutoff", { p_name:session.name, p_pin:session.pin, p_show_id:showId, p_cutoff:new Date(input.value).toISOString() });
    btn.textContent = "✔"; setTimeout(() => btn.textContent = "Set", 1500);
  }catch(e){ toast(e.message); }
}
async function finalizeShow(showId, btn){
  if (!confirm("Run final scoring and mark this show complete? Picks and scores lock for good.")) return;
  btn.disabled = true; btn.textContent = "…";
  try{
    await edgeFn("score").catch(() => {});
    await rpc("admin_set_show_status", { p_name:session.name, p_pin:session.pin, p_show_id:showId, p_status:"final" });
    toast("Show finalized 🏁", "score");
    renderAdmin();
  }catch(e){ toast(e.message); btn.disabled = false; btn.textContent = "Finalize"; }
}
async function runEdge(action, btn){
  btn.disabled = true; const old = btn.textContent; btn.textContent = "…";
  try{ const r = await edgeFn(action); toast(JSON.stringify(r).slice(0,120), "score"); if(action==="sync_songs") loadSongs(); }
  catch(e){ toast(e.message); }
  btn.disabled = false; btn.textContent = old;
}

/* ---------------- realtime ---------------- */
const myLastPts = {};
function subscribeRealtime(){
  db.channel("live")
    .on("postgres_changes", { event:"INSERT", schema:"public", table:"setlist_songs" }, p => {
      const s = p.new;
      toast(`🎵 ${s.songname}${s.is_encore ? " (encore)" : ""}`, "", `song:${s.show_id}:${(s.songname||"").toLowerCase()}`);
      if (currentShow && tab !== "admin" && s.show_id === currentShow.id) openShow(currentShow.id);
    })
    .on("postgres_changes", { event:"*", schema:"public", table:"scores" }, p => {
      if (p.new?.player_id === session?.id && myLastPts[p.new.show_id] !== p.new.points){
        myLastPts[p.new.show_id] = p.new.points;
        toast(`You're at ${p.new.points} pts for this show`, "score");
      }
      if (tab === "board") renderBoard();
    })
    .subscribe();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && session) refreshCurrent();
  });
}
function refreshCurrent(){
  if (tab === "board") renderBoard();
  else if (tab === "admin") renderAdmin();
  else if (currentShow) openShow(currentShow.id);
  else renderShows();
}

/* ---------------- tabs ---------------- */
function markTab(){
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("on", b.dataset.tab === tab));
}
document.querySelectorAll("nav.tabs button").forEach(b => b.onclick = () => {
  ({ shows: renderShows, board: renderBoard, admin: renderAdmin })[b.dataset.tab]();
});

boot();
</script>
</body>
</html>
